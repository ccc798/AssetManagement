name: asset_management
description: Asset Management - Personal asset tracking system
publish_to: 'none'
version: 0.0.4

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.6.1

  path_provider: ^2.1.5

  dio: ^5.4.0

  image_picker: ^1.1.2
  flutter_image_compress: ^2.1.0

  fl_chart: ^0.69.0
  intl: ^0.20.2
  flutter_slidable: ^3.1.1

  file_picker: ^11.0.2
  share_plus: ^12.0.2
  uuid: ^4.5.1
  xml: ^6.5.0
  collection: ^1.18.0
  equatable: ^2.0.7
  crypto: ^3.0.3
  package_info_plus: ^8.0.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  mockito: ^5.4.4
  build_runner: ^2.4.8
  mocktail: ^1.0.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/









