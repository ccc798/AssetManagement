name: asset_management
description: Asset Management - Personal asset tracking system
publish_to: 'none'
version: 0.0.1+26061309

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 存储
  path_provider: ^2.1.5

  # AI / 网络
  dio: ^5.4.0

  # 截图
  image_picker: ^1.1.2

  # UI
  fl_chart: ^0.69.0
  intl: ^0.20.2
  flutter_slidable: ^3.1.1

  # 工具
  file_picker: ^11.0.2
  share_plus: ^12.0.2
  uuid: ^4.5.1
  xml: ^6.5.0
  collection: ^1.18.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
















